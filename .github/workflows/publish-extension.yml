name: Publish VS Code Extension

# Builds one VSIX per platform (native modules — node-pty, better-sqlite3 — are
# compiled on each runner) and, on a version tag, publishes them all to the
# Marketplace. See docs/EXTENSION_PUBLISHING.md.
#
# Trigger:
#   - push a tag like `v0.2.1`  → build + publish
#   - manual run (workflow_dispatch) → build only (artifacts), no publish
#
# Publishing secrets (set as Environment secrets on the `release` environment,
# not plain repo secrets — see docs/EXTENSION_PUBLISHING.md):
#   - VSCE_PAT   Azure DevOps PAT (Marketplace: Manage) — VS Code Marketplace
#   - OVSX_TOKEN Open VSX access token (emanubiz namespace) — Cursor/Windsurf
# Either may be omitted; that registry is then skipped with a notice.
#
# Secrets are never exposed to pull requests from forks, and the `release`
# environment can require manual approval before the publish job runs.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
          - os: macos-13 # Intel
            target: darwin-x64
          - os: macos-14 # Apple Silicon
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Root install builds the backend's native deps (node-pty, better-sqlite3)
      # for THIS runner's OS/arch + Node ABI — the whole reason for a per-platform
      # matrix. The lockfile must stay clean of local `file:` deps for `npm ci`.
      - name: Install workspace (builds native modules)
        run: npm ci

      # vsce isn't pinned in the extension lockfile, so use install (not ci) here.
      - name: Install extension toolchain
        working-directory: vscode-extension
        run: npm install

      # `vsce package` runs `vscode:prepublish` (tsc + scripts/bundle.mjs), which
      # assembles server/ with the freshly built native binaries for this target.
      - name: Package VSIX
        working-directory: vscode-extension
        run: npx --no-install @vscode/vsce package --target ${{ matrix.target }} -o "pinodes-orchestra-${{ matrix.target }}.vsix"

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: vscode-extension/pinodes-orchestra-${{ matrix.target }}.vsix
          if-no-files-found: error

  publish:
    name: Publish (Marketplace + Open VSX)
    needs: build
    # Only on a version tag. Secrets are scoped to the `release` environment,
    # which can gate the job behind a manual approval (configure required
    # reviewers in repo Settings → Environments → release).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: vsix
          merge-multiple: true

      # Tokens are read by vsce/ovsx straight from the environment (VSCE_PAT /
      # OVSX_PAT) — never passed as a CLI arg, so they don't appear in process
      # listings. GitHub also masks secret values in logs and withholds them from
      # fork PRs entirely.
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::notice::VSCE_PAT not set — skipping VS Code Marketplace."
            exit 0
          fi
          for vsix in vsix/*.vsix; do
            echo "Marketplace: publishing $vsix"
            npx --yes @vscode/vsce publish --packagePath "$vsix"
          done

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_TOKEN }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::notice::OVSX_TOKEN not set — skipping Open VSX."
            exit 0
          fi
          for vsix in vsix/*.vsix; do
            echo "Open VSX: publishing $vsix"
            npx --yes ovsx publish "$vsix"
          done
